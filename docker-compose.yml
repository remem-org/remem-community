services:
  # ============================================================
  # RUST BACKEND - remem-server
  # ============================================================
  remem-server:
    build:
      context: .
      dockerfile: docker/remem-server.Dockerfile
      args:
        EDITION_FEATURES: ""  # community: no business Rust features
    container_name: remem-server
    ports:
      - "4545:4545"
    volumes:
      - ./data/remem:/var/lib/remem:Z
      - ./config/remem-server.toml:/etc/remem/config.toml:ro,Z
    environment:
      - RUST_LOG=info
      - REMEM_ENV=${REMEM_ENV:-development}
      - REMEM_API_KEY=${REMEM_API_KEY:-}
      - REMEM_API_KEY_SECONDARY=${REMEM_API_KEY_SECONDARY:-}
      - REMEM_ALLOW_AUTH_DISABLED=${REMEM_ALLOW_AUTH_DISABLED:-false}
      - REMEM_CORS_ORIGINS=${REMEM_CORS_ORIGINS:-http://localhost:3000}
      - OMP_NUM_THREADS=4
      - ORT_NUM_INTRA_THREADS=4
      - REMEM_RATE_LIMIT_RPS=${REMEM_RATE_LIMIT_RPS:-100}
      - REMEM_RATE_LIMIT_BURST=${REMEM_RATE_LIMIT_BURST:-50}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4545/api/v1/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - remem-network

  # ============================================================
  # MCP SERVER - remem-mcp
  # ============================================================
  remem-mcp:
    build:
      context: .
      dockerfile: docker/remem-mcp.Dockerfile
    container_name: remem-mcp-server
    ports:
      - "4546:4546"
    environment:
      - REMEM_SERVER_URL=http://remem-server:4545
      - MCP_TRANSPORT=sse
      - MCP_HOST=0.0.0.0
      - MCP_PORT=4546
      - REMEM_API_KEY=${REMEM_API_KEY:-}
    depends_on:
      remem-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4546/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - remem-network

networks:
  remem-network:
    driver: bridge
    name: remem-network
