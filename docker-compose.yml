services:
  # ============================================================
  # RUST BACKEND - remem-server
  # ============================================================
  remem-server:
    build:
      context: .
      dockerfile: docker/remem-server.Dockerfile
      args:
        EDITION_FEATURES: ""  # community: no business Rust features
    container_name: remem-server
    ports:
      - "8001:8001"
    volumes:
      - ./data/remem:/var/lib/remem:Z
      - ./config/remem-server.toml:/etc/remem/config.toml:ro,Z
    environment:
      - RUST_LOG=info
      - REMEM_API_KEY=${REMEM_API_KEY:-}
      - OMP_NUM_THREADS=4
      - ORT_NUM_INTRA_THREADS=4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v1/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - remem-network

  # ============================================================
  # MCP SERVER - remem-mcp
  # ============================================================
  remem-mcp:
    build:
      context: .
      dockerfile: docker/remem-mcp.Dockerfile
    container_name: remem-mcp-server
    ports:
      - "8000:8000"
    environment:
      - REMEM_SERVER_URL=http://remem-server:8001
      - MCP_TRANSPORT=sse
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
      - REMEM_API_KEY=${REMEM_API_KEY:-}
    depends_on:
      remem-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - remem-network

networks:
  remem-network:
    driver: bridge
    name: remem-network
