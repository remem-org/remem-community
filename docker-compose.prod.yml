services:
  # ============================================================
  # RUST BACKEND - remem-server
  # ============================================================
  remem-server:
    build:
      context: .
      dockerfile: docker/remem-server.Dockerfile
      args:
        EDITION_FEATURES: ${EDITION_FEATURES:-business}
    container_name: remem-server
    ports:
      - "8001:8001"  # REST API (same port as old remem-api)
    volumes:
      - ./data/remem:/var/lib/remem:Z
      - ./config/remem-server.toml:/etc/remem/config.toml:ro,Z
    environment:
      - RUST_LOG=info
      - REMEM_API_KEY=${REMEM_API_KEY:-}
      - OMP_NUM_THREADS=4
      - ORT_NUM_INTRA_THREADS=4
      - REMEM_RATE_LIMIT_RPS=${REMEM_RATE_LIMIT_RPS:-0}
      - REMEM_RATE_LIMIT_BURST=${REMEM_RATE_LIMIT_BURST:-50}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v1/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s    # extra time for ONNX model load on first start
    restart: unless-stopped
    networks:
      - remem-network

  # Redis — used by backoffice (sessions, JWT blacklist, API cache)
  redis:
    image: redis:7-alpine
    container_name: remem-redis
    volumes:
      - redis_data:/data
    command: >
      redis-server --appendonly yes --appendfsync everysec --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - remem-network

  # ============================================================
  # MAIN APPLICATION SERVICES
  # ============================================================

  # Remem MCP Server (Rust — calls Rust REST API via SSE transport)
  remem-mcp:
    image: ${REMEM_MCP_IMAGE:-remem-mcp:latest}
    container_name: remem-mcp-server
    ports:
      - "8000:8000"
    environment:
      - REMEM_SERVER_URL=http://remem-server:8001
      - MCP_TRANSPORT=sse
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
      - REMEM_API_KEY=${REMEM_API_KEY:?REMEM_API_KEY is required}
    depends_on:
      remem-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - remem-network

  # ============================================================
  # BACKOFFICE SERVICES
  # ============================================================

  # Backoffice Database - PostgreSQL
  backoffice-postgres:
    image: postgres:15-alpine
    container_name: backoffice-postgres
    volumes:
      - backoffice_postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=backoffice
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=backoffice
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=en_US.utf8
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backoffice -d backoffice"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - remem-network

  # Backoffice Backend - FastAPI
  backoffice-backend:
    image: ${BACKOFFICE_BACKEND_IMAGE:-backoffice-backend:latest}
    container_name: backoffice-backend
    ports:
      - "8002:8002"
    environment:
      - BACKOFFICE_DATABASE_URL=postgresql+asyncpg://backoffice:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@backoffice-postgres:5432/backoffice
      - REDIS_URL=redis://redis:6379/1
      - REMEM_API_URL=http://remem-server:8001/api/v1
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      - JWT_ALGORITHM=HS256
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=240
      - BACKOFFICE_API_HOST=0.0.0.0
      - BACKOFFICE_API_PORT=8002
      - BACKOFFICE_BOOTSTRAP_DATABASE=false
      - LOG_LEVEL=INFO
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      backoffice-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      remem-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/api/v1/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - remem-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8002

  # Backoffice Frontend - React SPA (served by nginx)
  backoffice-frontend:
    image: ${BACKOFFICE_FRONTEND_IMAGE:-backoffice-frontend:latest}
    container_name: backoffice-frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8002/api/v1}
    depends_on:
      - backoffice-backend
    restart: unless-stopped
    networks:
      - remem-network


  # ============================================================
  # OBSERVABILITY (opt-in: docker compose --profile observability up -d)
  # ============================================================

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: remem-prometheus
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    depends_on:
      - remem-server
    networks:
      - remem-network
    restart: unless-stopped
    profiles: [observability]

  grafana:
    image: grafana/grafana:11.1.0
    container_name: remem-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD is required}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - remem-network
    restart: unless-stopped
    profiles: [observability]


volumes:
  remem_data:
    driver: local
  redis_data:
    driver: local
  backoffice_postgres_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  remem-network:
    driver: bridge
    name: remem-network
