name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  rust-lint:
    name: Rust Lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-lint
          key: ${{ runner.os }}-buildx-lint-${{ hashFiles('Cargo.lock', 'docker/remem-server.Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-buildx-lint-

      - name: Lint (fmt + clippy)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/remem-server.Dockerfile
          target: linter
          push: false
          cache-from: type=local,src=/tmp/.buildx-cache-lint
          cache-to: type=local,dest=/tmp/.buildx-cache-lint-new,mode=max

      - name: Rotate cache
        run: |
          rm -rf /tmp/.buildx-cache-lint
          mv /tmp/.buildx-cache-lint-new /tmp/.buildx-cache-lint

  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-test
          key: ${{ runner.os }}-buildx-test-${{ hashFiles('Cargo.lock', 'docker/remem-server.Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-buildx-test-

      - name: Test
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/remem-server.Dockerfile
          target: tester
          push: false
          cache-from: type=local,src=/tmp/.buildx-cache-test
          cache-to: type=local,dest=/tmp/.buildx-cache-test-new,mode=max

      - name: Rotate cache
        run: |
          rm -rf /tmp/.buildx-cache-test
          mv /tmp/.buildx-cache-test-new /tmp/.buildx-cache-test
